{% extends "admin/base.html" %}
{% block extrahead %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#020b18;--bg-panel:#040f1f;--bg-card:#061428;--bg-hover:#0a1e35;--cyan:#00e5ff;--cyan-dim:#00bcd4;--cyan-glow:rgba(0,229,255,0.15);--violet:#7c4dff;--violet-glow:rgba(124,77,255,0.15);--green:#00e676;--amber:#ffab00;--red:#ff1744;--text-primary:#e0f7ff;--text-muted:#4a7a8a;--border:rgba(0,229,255,0.18);--border-strong:rgba(0,229,255,0.45);}
*{box-sizing:border-box;}
body{background:var(--bg-deep)!important;color:var(--text-primary)!important;font-family:'Rajdhani',sans-serif!important;font-size:15px!important;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(0,229,255,0.07) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}
#header{background:linear-gradient(135deg,#020b18 0%,#040f2a 100%)!important;border-bottom:1px solid var(--border-strong)!important;padding:14px 40px!important;position:relative;overflow:hidden;box-shadow:0 4px 40px rgba(0,229,255,0.12)!important;}
#header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--violet),transparent);animation:scanline 3s linear infinite;}
@keyframes scanline{0%,100%{opacity:0.3;}50%{opacity:1;}}
#site-name a,#site-name a:visited{color:var(--cyan)!important;font-family:'Orbitron',monospace!important;font-size:20px!important;font-weight:700!important;text-decoration:none!important;letter-spacing:0.15em!important;text-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,229,255,0.4)!important;}
#user-tools,#user-tools a{color:var(--cyan-dim)!important;font-family:'Share Tech Mono',monospace!important;font-size:13px!important;}
#user-tools a:hover{color:var(--cyan)!important;}
div.breadcrumbs{background:rgba(0,229,255,0.04)!important;border-bottom:1px solid var(--border)!important;color:var(--text-muted)!important;font-family:'Share Tech Mono',monospace!important;font-size:12px!important;padding:10px 40px!important;}
div.breadcrumbs a{color:var(--cyan-dim)!important;}
div.breadcrumbs a:hover{color:var(--cyan)!important;}
#nav-sidebar{background:var(--bg-panel)!important;border-right:1px solid var(--border)!important;}
.module{background:var(--bg-card)!important;border:1px solid var(--border)!important;border-radius:4px!important;margin-bottom:20px!important;overflow:hidden!important;position:relative;transition:border-color 0.2s,box-shadow 0.2s;animation:pulseborder 4s ease-in-out infinite;}
.module:hover{border-color:var(--border-strong)!important;box-shadow:0 0 20px rgba(0,229,255,0.08)!important;animation:none;}
.module::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--cyan));opacity:0;transition:opacity 0.3s;}
.module:hover::before{opacity:1;}
@keyframes pulseborder{0%,100%{border-color:rgba(0,229,255,0.15);}50%{border-color:rgba(0,229,255,0.35);}}
.module caption,.inline-group h2{background:transparent!important;border-bottom:1px solid var(--border-strong)!important;color:var(--cyan)!important;font-family:'Orbitron',monospace!important;font-size:11px!important;font-weight:700!important;letter-spacing:0.2em!important;padding:12px 16px!important;text-transform:uppercase!important;}
#content{background:transparent!important;padding:30px 40px!important;position:relative;z-index:1;}
#content-main{background:transparent!important;}
#content h1{color:var(--text-primary)!important;font-family:'Orbitron',monospace!important;font-size:22px!important;font-weight:700!important;letter-spacing:0.1em!important;border-bottom:1px solid var(--border)!important;padding-bottom:16px!important;margin-bottom:24px!important;}
#result_list{border:1px solid var(--border)!important;border-radius:4px!important;width:100%!important;border-collapse:collapse!important;}
#result_list thead th{background:var(--bg-panel)!important;border-bottom:1px solid var(--border-strong)!important;color:var(--cyan)!important;font-family:'Share Tech Mono',monospace!important;font-size:11px!important;letter-spacing:0.15em!important;padding:12px 16px!important;text-transform:uppercase!important;}
#result_list thead th a{color:var(--cyan)!important;text-decoration:none!important;}
#result_list tbody tr{border-bottom:1px solid rgba(0,229,255,0.06)!important;transition:background 0.15s!important;}
#result_list tbody tr:hover{background:var(--bg-hover)!important;}
#result_list td,#result_list th{color:var(--text-primary)!important;padding:11px 16px!important;font-size:14px!important;}
#result_list td a{color:var(--cyan-dim)!important;text-decoration:none!important;font-weight:600!important;}
#result_list td a:hover{color:var(--cyan)!important;}
#result_list tbody tr:nth-child(odd){background:rgba(6,20,40,0.8)!important;}
#result_list tbody tr:nth-child(even){background:rgba(4,15,31,0.9)!important;}
#result_list tbody tr:nth-child(odd):hover,#result_list tbody tr:nth-child(even):hover{background:var(--bg-hover)!important;}
.form-row{border-bottom:1px solid rgba(0,229,255,0.06)!important;padding:14px 0!important;}
label{color:var(--cyan-dim)!important;font-family:'Share Tech Mono',monospace!important;font-size:12px!important;letter-spacing:0.1em!important;text-transform:uppercase!important;}
input[type="text"],input[type="password"],input[type="email"],input[type="number"],input[type="url"],input[type="date"],select,textarea{background:#020c1a!important;border:1px solid var(--border)!important;border-radius:3px!important;color:var(--text-primary)!important;font-family:'Share Tech Mono',monospace!important;font-size:14px!important;padding:10px 14px!important;width:100%!important;}
input[type="text"]:focus,input[type="password"]:focus,input[type="email"]:focus,select:focus,textarea:focus{border-color:var(--cyan)!important;box-shadow:0 0 0 2px rgba(0,229,255,0.12)!important;outline:none!important;}
input[type="checkbox"]{accent-color:var(--cyan)!important;width:16px!important;height:16px!important;}
.button,input[type="submit"],input[type="button"],.submit-row input,a.button{background:transparent!important;border:1px solid var(--cyan)!important;border-radius:3px!important;color:var(--cyan)!important;cursor:pointer!important;font-family:'Orbitron',monospace!important;font-size:11px!important;font-weight:700!important;letter-spacing:0.15em!important;padding:10px 24px!important;text-transform:uppercase!important;transition:all 0.2s!important;}
.button:hover,input[type="submit"]:hover,.submit-row input:hover{background:var(--cyan-glow)!important;box-shadow:0 0 20px rgba(0,229,255,0.25)!important;color:#fff!important;}
.deletelink,.deletelink-box a{border-color:var(--red)!important;color:var(--red)!important;}
.deletelink:hover,.deletelink-box a:hover{background:rgba(255,23,68,0.1)!important;}
.submit-row{background:var(--bg-panel)!important;border-top:1px solid var(--border)!important;padding:16px 20px!important;}
.messagelist li{border-radius:3px!important;font-family:'Share Tech Mono',monospace!important;font-size:13px!important;margin-bottom:8px!important;padding:12px 16px!important;}
.messagelist li.success{background:rgba(0,230,118,0.08)!important;border-left:3px solid var(--green)!important;color:var(--green)!important;}
.messagelist li.warning{background:rgba(255,171,0,0.08)!important;border-left:3px solid var(--amber)!important;color:var(--amber)!important;}
.messagelist li.error{background:rgba(255,23,68,0.08)!important;border-left:3px solid var(--red)!important;color:var(--red)!important;}
.paginator{color:var(--text-muted)!important;font-family:'Share Tech Mono',monospace!important;font-size:12px!important;padding:16px!important;}
.paginator a,.paginator .this-page{border:1px solid var(--border)!important;border-radius:3px!important;color:var(--cyan-dim)!important;display:inline-block!important;padding:6px 10px!important;text-decoration:none!important;}
.paginator .this-page,.paginator a:hover{background:var(--cyan-glow)!important;border-color:var(--cyan)!important;color:var(--cyan)!important;}
#changelist-filter{background:var(--bg-panel)!important;border-left:1px solid var(--border)!important;}
#changelist-filter h2{background:transparent!important;color:var(--cyan)!important;font-family:'Orbitron',monospace!important;font-size:10px!important;letter-spacing:0.2em!important;padding:12px 16px!important;text-transform:uppercase!important;}
#changelist-filter li a{color:var(--text-muted)!important;display:block!important;font-family:'Share Tech Mono',monospace!important;font-size:12px!important;padding:8px 16px!important;text-decoration:none!important;}
#changelist-filter li a:hover,#changelist-filter li.selected a{background:var(--cyan-glow)!important;color:var(--cyan)!important;}
#toolbar{background:var(--bg-panel)!important;border-bottom:1px solid var(--border)!important;padding:12px 16px!important;}
#searchbar{background:#020c1a!important;border:1px solid var(--border)!important;border-radius:3px!important;color:var(--text-primary)!important;font-family:'Share Tech Mono',monospace!important;padding:8px 14px!important;width:280px!important;}
#searchbar:focus{border-color:var(--cyan)!important;outline:none!important;}
a{color:var(--cyan-dim)!important;}
a:hover{color:var(--cyan)!important;}
fieldset{background:var(--bg-card)!important;border:1px solid var(--border)!important;border-radius:4px!important;padding:16px 20px!important;margin-bottom:16px!important;}
fieldset h2{color:var(--violet)!important;font-family:'Orbitron',monospace!important;font-size:11px!important;letter-spacing:0.15em!important;text-transform:uppercase!important;}
.help,p.help{color:var(--text-muted)!important;font-family:'Share Tech Mono',monospace!important;font-size:11px!important;}
ul.errorlist li{background:rgba(255,23,68,0.08)!important;border-left:3px solid var(--red)!important;color:var(--red)!important;font-family:'Share Tech Mono',monospace!important;padding:8px 12px!important;list-style:none!important;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
body.login{background:var(--bg-deep)!important;}
body.login #header{display:none;}
body.login #content-main{background:var(--bg-card)!important;border:1px solid var(--border-strong)!important;border-radius:6px!important;box-shadow:0 0 60px rgba(0,229,255,0.1)!important;padding:40px!important;max-width:400px;margin:80px auto;}
body.login #content-main::before{content:'◈ BIBLIOTHÈQUE API';display:block;color:var(--cyan)!important;font-family:'Orbitron',monospace!important;font-size:16px!important;font-weight:700!important;letter-spacing:0.2em!important;text-align:center!important;text-shadow:0 0 20px var(--cyan);margin-bottom:32px!important;}
body.login h1{display:none;}
</style>
{% endblock %}
